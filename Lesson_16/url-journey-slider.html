<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What Happens When You Type a URL</title>
<style>
  :root {
    --bg: #0b1020;
    --panel: #111827;
    --panel-2: #182133;
    --panel-3: #202b40;
    --text: #f4f7fb;
    --muted: #9aa8ba;
    --line: rgba(255, 255, 255, 0.12);
    --line-strong: rgba(255, 255, 255, 0.22);
    --blue: #4ea1ff;
    --green: #56d58a;
    --amber: #ffd166;
    --red: #ff6b7a;
    --violet: #a98bff;
    --cyan: #5ad7d1;
    --ink: #08111f;
    --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    min-height: 100%;
  }

  body {
    margin: 0;
    background:
      radial-gradient(circle at 10% 12%, rgba(86, 213, 138, 0.14), transparent 26rem),
      radial-gradient(circle at 92% 14%, rgba(78, 161, 255, 0.16), transparent 30rem),
      linear-gradient(145deg, #090d18 0%, #0b1020 48%, #101525 100%);
    color: var(--text);
    font-family: var(--sans);
    line-height: 1.5;
  }

  button,
  input {
    font: inherit;
  }

  button {
    cursor: pointer;
  }

  .app {
    width: min(1180px, calc(100% - 32px));
    margin: 0 auto;
    padding: 28px 0;
  }

  .topbar {
    display: flex;
    align-items: end;
    justify-content: space-between;
    gap: 20px;
    padding: 0 0 18px;
    border-bottom: 1px solid var(--line);
  }

  .eyebrow {
    margin: 0 0 8px;
    color: var(--cyan);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  h1 {
    max-width: 780px;
    margin: 0;
    font-size: clamp(30px, 5vw, 56px);
    line-height: 1;
    letter-spacing: 0;
  }

  .url-chip {
    display: inline-flex;
    align-items: center;
    min-height: 34px;
    padding: 6px 12px;
    border: 1px solid var(--line-strong);
    border-radius: 7px;
    background: rgba(255, 255, 255, 0.06);
    color: var(--amber);
    font-family: var(--mono);
    font-size: 14px;
    white-space: nowrap;
  }

  .layout {
    display: grid;
    grid-template-columns: minmax(260px, 340px) minmax(0, 1fr);
    gap: 22px;
    align-items: start;
    padding-top: 22px;
  }

  .timeline {
    position: sticky;
    top: 18px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(17, 24, 39, 0.82);
    backdrop-filter: blur(14px);
    overflow: hidden;
  }

  .timeline-header {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    padding: 14px;
    border-bottom: 1px solid var(--line);
  }

  .timeline-title {
    margin: 0;
    font-weight: 750;
  }

  .progress {
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    white-space: nowrap;
  }

  .steps {
    display: grid;
    gap: 2px;
    padding: 10px;
  }

  .step-button {
    display: grid;
    grid-template-columns: 32px 1fr;
    gap: 10px;
    align-items: center;
    width: 100%;
    min-height: 46px;
    padding: 8px;
    border: 1px solid transparent;
    border-radius: 7px;
    background: transparent;
    color: var(--muted);
    text-align: left;
    transition: background 160ms ease, border-color 160ms ease, color 160ms ease;
  }

  .step-button:hover {
    border-color: var(--line);
    background: rgba(255, 255, 255, 0.04);
    color: var(--text);
  }

  .step-button.is-active {
    border-color: rgba(78, 161, 255, 0.5);
    background: rgba(78, 161, 255, 0.13);
    color: var(--text);
  }

  .step-num {
    display: inline-grid;
    place-items: center;
    width: 30px;
    height: 30px;
    border: 1px solid var(--line-strong);
    border-radius: 50%;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
  }

  .is-active .step-num {
    background: var(--blue);
    border-color: var(--blue);
    color: #061221;
    font-weight: 800;
  }

  .step-name {
    overflow-wrap: anywhere;
    font-size: 14px;
    font-weight: 650;
  }

  .stage {
    min-width: 0;
  }

  .slide {
    min-height: 540px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: linear-gradient(180deg, rgba(24, 33, 51, 0.92), rgba(17, 24, 39, 0.94));
    box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
    overflow: hidden;
  }

  .slide-head {
    display: flex;
    justify-content: space-between;
    gap: 14px;
    align-items: center;
    padding: 18px 20px;
    border-bottom: 1px solid var(--line);
  }

  .slide-kicker {
    margin: 0 0 4px;
    color: var(--green);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .slide-title {
    margin: 0;
    font-size: clamp(24px, 4vw, 38px);
    line-height: 1.08;
    letter-spacing: 0;
  }

  .status-pill {
    display: inline-flex;
    align-items: center;
    min-height: 34px;
    padding: 6px 10px;
    border: 1px solid var(--line-strong);
    border-radius: 7px;
    background: rgba(255, 255, 255, 0.06);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    white-space: nowrap;
  }

  .slide-body {
    display: grid;
    grid-template-columns: minmax(0, 1.05fr) minmax(270px, 0.95fr);
    gap: 22px;
    align-items: stretch;
    padding: 22px;
  }

  .copy {
    min-width: 0;
  }

  .copy p {
    margin: 0 0 16px;
    color: #dce5ef;
    font-size: clamp(17px, 2vw, 20px);
  }

  .copy strong {
    color: var(--text);
  }

  .callout {
    margin-top: 18px;
    padding: 14px;
    border: 1px solid rgba(90, 215, 209, 0.32);
    border-radius: 8px;
    background: rgba(90, 215, 209, 0.09);
  }

  .callout-label {
    margin: 0 0 6px;
    color: var(--cyan);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .callout p {
    margin: 0;
    font-size: 16px;
    color: #d9f9f7;
  }

  .visual {
    min-width: 0;
    min-height: 330px;
    display: grid;
    align-content: center;
    gap: 16px;
    padding: 18px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background:
      linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
      rgba(8, 17, 31, 0.8);
    background-size: 28px 28px;
  }

  .network-row,
  .dns-row,
  .resource-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .node {
    display: grid;
    place-items: center;
    min-width: 118px;
    min-height: 78px;
    padding: 12px;
    border: 1px solid var(--line-strong);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.08);
    text-align: center;
  }

  .node b {
    display: block;
    color: var(--text);
    font-size: 16px;
  }

  .node span {
    display: block;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
  }

  .node.browser {
    border-color: rgba(78, 161, 255, 0.48);
  }

  .node.dns {
    border-color: rgba(255, 209, 102, 0.52);
  }

  .node.server {
    border-color: rgba(86, 213, 138, 0.52);
  }

  .arrow {
    color: var(--amber);
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 900;
  }

  .packet {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 38px;
    max-width: 100%;
    padding: 8px 11px;
    border-radius: 6px;
    background: var(--amber);
    color: var(--ink);
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 800;
    overflow-wrap: anywhere;
  }

  .packet.blue {
    background: var(--blue);
  }

  .packet.green {
    background: var(--green);
  }

  .packet.violet {
    background: var(--violet);
  }

  .code-block {
    width: 100%;
    margin: 0;
    padding: 14px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(0, 0, 0, 0.26);
    color: #eaf2fb;
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.55;
    overflow-x: auto;
    white-space: pre;
  }

  .resource {
    display: grid;
    place-items: center;
    width: 84px;
    height: 84px;
    border-radius: 8px;
    color: var(--ink);
    font-family: var(--mono);
    font-weight: 900;
  }

  .resource.html {
    background: var(--green);
  }

  .resource.css {
    background: var(--blue);
  }

  .resource.js {
    background: var(--amber);
  }

  .mini-browser {
    overflow: hidden;
    width: min(420px, 100%);
    min-height: 220px;
    border: 1px solid var(--line-strong);
    border-radius: 8px;
    background: #f9fafb;
    color: #101827;
  }

  .browser-bar {
    display: flex;
    gap: 6px;
    align-items: center;
    height: 34px;
    padding: 0 10px;
    border-bottom: 1px solid #d7dee8;
    background: #eef2f7;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #ff6b7a;
  }

  .dot:nth-child(2) {
    background: #ffd166;
  }

  .dot:nth-child(3) {
    background: #56d58a;
  }

  .fake-page {
    display: grid;
    gap: 10px;
    padding: 16px;
  }

  .fake-heading,
  .fake-line,
  .fake-image {
    border-radius: 5px;
    background: #dbeafe;
  }

  .fake-heading {
    width: 70%;
    height: 28px;
    background: #60a5fa;
  }

  .fake-line {
    height: 14px;
  }

  .fake-line.short {
    width: 56%;
  }

  .fake-image {
    height: 82px;
    background: linear-gradient(135deg, #56d58a, #5ad7d1);
  }

  .summary-list,
  .check-list {
    display: grid;
    gap: 10px;
    margin: 20px 0 0;
    padding: 0;
    list-style: none;
  }

  .summary-list li,
  .check-list li {
    display: grid;
    grid-template-columns: 32px 1fr;
    gap: 10px;
    align-items: start;
    padding: 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.045);
  }

  .summary-list span,
  .check-list span {
    display: grid;
    place-items: center;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: rgba(86, 213, 138, 0.16);
    color: var(--green);
    font-family: var(--mono);
    font-weight: 800;
  }

  .role-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
    margin-top: 20px;
  }

  .role {
    min-width: 0;
    padding: 14px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.045);
  }

  .role h3 {
    margin: 0 0 8px;
    font-size: 21px;
  }

  .role p {
    margin: 0;
    color: var(--muted);
    font-size: 15px;
  }

  .role.html h3 {
    color: var(--green);
  }

  .role.css h3 {
    color: var(--blue);
  }

  .role.js h3 {
    color: var(--amber);
  }

  .quiz {
    display: grid;
    gap: 14px;
  }

  .quiz-row {
    display: grid;
    grid-template-columns: 170px minmax(0, 1fr);
    gap: 12px;
    align-items: center;
  }

  .quiz-row label {
    color: var(--text);
    font-weight: 750;
  }

  .quiz-row input {
    width: 100%;
    min-height: 44px;
    padding: 10px 12px;
    border: 1px solid var(--line-strong);
    border-radius: 7px;
    outline: none;
    background: rgba(255, 255, 255, 0.08);
    color: var(--text);
  }

  .quiz-row input:focus {
    border-color: var(--blue);
  }

  .answer-key {
    display: none;
    margin-top: 14px;
    padding: 14px;
    border: 1px solid rgba(86, 213, 138, 0.36);
    border-radius: 8px;
    background: rgba(86, 213, 138, 0.1);
    color: #dffbea;
  }

  .answer-key.is-visible {
    display: block;
  }

  .controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    padding: 16px 0 0;
  }

  .control-group {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  .nav-button,
  .ghost-button {
    min-height: 42px;
    padding: 9px 14px;
    border-radius: 7px;
    font-weight: 750;
  }

  .nav-button {
    border: 1px solid var(--blue);
    background: var(--blue);
    color: #061221;
  }

  .nav-button:disabled {
    cursor: default;
    opacity: 0.45;
  }

  .ghost-button {
    border: 1px solid var(--line-strong);
    background: rgba(255, 255, 255, 0.06);
    color: var(--text);
  }

  .dots {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }

  .dot-button {
    width: 10px;
    height: 10px;
    padding: 0;
    border: 0;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.25);
  }

  .dot-button.is-active {
    width: 28px;
    border-radius: 999px;
    background: var(--green);
  }

  .fade {
    animation: fade 180ms ease both;
  }

  @keyframes fade {
    from {
      opacity: 0.35;
      transform: translateY(6px);
    }

    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @media (max-width: 900px) {
    .layout {
      grid-template-columns: 1fr;
    }

    .timeline {
      position: static;
    }

    .steps {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .slide-body {
      grid-template-columns: 1fr;
    }

    .slide {
      min-height: 0;
    }
  }

  @media (max-width: 640px) {
    .app {
      width: min(100% - 20px, 1180px);
      padding: 18px 0;
    }

    .topbar,
    .slide-head,
    .controls {
      align-items: stretch;
      flex-direction: column;
    }

    .steps,
    .role-grid {
      grid-template-columns: 1fr;
    }

    .quiz-row {
      grid-template-columns: 1fr;
    }

    .visual {
      min-height: 260px;
    }
  }
</style>
</head>
<body>
<main class="app">
  <header class="topbar">
    <div>
      <p class="eyebrow">Lesson 16 / How the Web Works</p>
      <h1>What happens when you type a URL?</h1>
    </div>
    <div class="url-chip">www.example.com</div>
  </header>

  <div class="layout">
    <aside class="timeline" aria-label="URL journey steps">
      <div class="timeline-header">
        <p class="timeline-title">Journey</p>
        <div class="progress" id="progressText">1 / 14</div>
      </div>
      <div class="steps" id="stepList"></div>
    </aside>

    <section class="stage" aria-live="polite">
      <article class="slide fade" id="slide"></article>
      <div class="controls">
        <div class="control-group">
          <button class="ghost-button" id="prevButton" type="button">Previous</button>
          <button class="nav-button" id="nextButton" type="button">Next</button>
        </div>
        <div class="dots" id="dots" aria-label="Slide position"></div>
        <button class="ghost-button" id="answerButton" type="button">Show answers</button>
      </div>
    </section>
  </div>
</main>

<script>
  const slides = [
    {
      label: "Big picture",
      title: "A webpage loads because two computers have a conversation.",
      tag: "Start here",
      body: `
        <p>The browser is the <strong>client</strong>. It asks for something.</p>
        <p>A remote computer is the <strong>server</strong>. It listens, prepares files, and sends them back.</p>
        <div class="callout">
          <p class="callout-label">Plain English</p>
          <p>The browser finds an address, connects, asks for a page, receives files, then builds what you see.</p>
        </div>
      `,
      visual: `
        <div class="network-row">
          <div class="node browser"><b>Browser</b><span>client</span></div>
          <div class="arrow">-&gt;</div>
          <div class="packet">REQUEST</div>
          <div class="arrow">-&gt;</div>
          <div class="node server"><b>Server</b><span>remote computer</span></div>
        </div>
        <div class="network-row">
          <div class="node browser"><b>Render</b><span>show page</span></div>
          <div class="arrow">&lt;-</div>
          <div class="packet green">RESPONSE</div>
          <div class="arrow">&lt;-</div>
          <div class="node server"><b>Files</b><span>HTML CSS JS</span></div>
        </div>
      `
    },
    {
      label: "Step 1",
      title: "You type www.example.com and hit Enter.",
      tag: "Human input",
      body: `
        <p>A URL is a human-friendly way to describe what page you want.</p>
        <p>The browser now has a name, but it still needs the machine address before it can connect.</p>
      `,
      visual: `
        <pre class="code-block">Address bar:

www.example.com

Enter pressed...</pre>
      `
    },
    {
      label: "Step 2",
      title: "DNS asks: what IP address belongs to this name?",
      tag: "Lookup",
      body: `
        <p>Computers do not connect to names like <strong>www.example.com</strong>.</p>
        <p>DNS is the lookup service that translates the name into an IP address.</p>
      `,
      visual: `
        <div class="dns-row">
          <div class="node browser"><b>Browser</b><span>has a name</span></div>
          <div class="arrow">-&gt;</div>
          <div class="packet">DNS lookup</div>
          <div class="arrow">-&gt;</div>
          <div class="node dns"><b>DNS</b><span>phonebook</span></div>
        </div>
      `
    },
    {
      label: "Step 3",
      title: "DNS returns an IP address.",
      tag: "Address found",
      body: `
        <p>The browser receives a number like <strong>93.184.216.34</strong>.</p>
        <p>That IP address is what the computer uses to find the server on the network.</p>
      `,
      visual: `
        <div class="dns-row">
          <div class="node dns"><b>DNS</b><span>lookup result</span></div>
          <div class="arrow">-&gt;</div>
          <div class="packet green">93.184.216.34</div>
          <div class="arrow">-&gt;</div>
          <div class="node browser"><b>Browser</b><span>now knows where</span></div>
        </div>
        <pre class="code-block">www.example.com  --DNS lookup--&gt;  93.184.216.34
(what you type)                  (what the computer uses)</pre>
      `
    },
    {
      label: "Step 4",
      title: "The browser opens a connection to that IP address.",
      tag: "TCP handshake",
      body: `
        <p>Before sending the page request, the browser and server quickly agree that they can talk.</p>
        <p>Think of it as: <strong>Are you there?</strong> / <strong>Yes, I am here.</strong></p>
      `,
      visual: `
        <div class="network-row">
          <div class="node browser"><b>Browser</b><span>93.184.216.34?</span></div>
          <div class="arrow">-&gt;</div>
          <div class="packet blue">Hello</div>
          <div class="arrow">-&gt;</div>
          <div class="node server"><b>Server</b><span>listening</span></div>
        </div>
        <div class="network-row">
          <div class="node browser"><b>Ready</b><span>connection open</span></div>
          <div class="arrow">&lt;-</div>
          <div class="packet green">Yes</div>
          <div class="arrow">&lt;-</div>
          <div class="node server"><b>Ready</b><span>connection open</span></div>
        </div>
      `
    },
    {
      label: "Step 5",
      title: "The browser sends an HTTP request.",
      tag: "Ask for page",
      body: `
        <p>The request says which resource the browser wants.</p>
        <p><strong>GET /</strong> means: please send me the homepage.</p>
      `,
      visual: `
        <pre class="code-block">GET / HTTP/1.1
Host: example.com

Please send me the homepage.</pre>
      `
    },
    {
      label: "Step 6",
      title: "The server processes the request.",
      tag: "Server work",
      body: `
        <p>The server reads the request and prepares a response.</p>
        <p>For a simple website, that response might be an HTML file. For an app, it might involve database work first.</p>
      `,
      visual: `
        <div class="network-row">
          <div class="node server"><b>Server</b><span>read request</span></div>
          <div class="arrow">+</div>
          <div class="node"><b>Files</b><span>index.html</span></div>
          <div class="arrow">+</div>
          <div class="node"><b>Logic</b><span>prepare response</span></div>
        </div>
      `
    },
    {
      label: "Step 7",
      title: "The server sends back an HTTP response.",
      tag: "Files return",
      body: `
        <p>The response includes a status code, headers, and usually content.</p>

  const slide = document.getElementById("slide");
  const stepList = document.getElementById("stepList");
  const dots = document.getElementById("dots");
  const progressText = document.getElementById("progressText");
  const prevButton = document.getElementById("prevButton");
  const nextButton = document.getElementById("nextButton");
  const answerButton = document.getElementById("answerButton");
  let current = 0;

  function renderTimeline() {
    stepList.innerHTML = slides.map((item, index) => `
      <button class="step-button${index === current ? " is-active" : ""}" type="button" data-index="${index}">
        <span class="step-num">${index + 1}</span>
        <span class="step-name">${item.label}</span>
      </button>
    `).join("");

    dots.innerHTML = slides.map((item, index) => `
      <button class="dot-button${index === current ? " is-active" : ""}" type="button" data-index="${index}" aria-label="Go to ${item.label}"></button>
    `).join("");
  }

  function renderSlide() {
    const item = slides[current];
    slide.classList.remove("fade");
    void slide.offsetWidth;
    slide.classList.add("fade");
    slide.innerHTML = `
      <div class="slide-head">
        <div>
          <p class="slide-kicker">${item.label}</p>
          <h2 class="slide-title">${item.title}</h2>
        </div>
        <div class="status-pill">${item.tag}</div>
      </div>
      <div class="slide-body">
        <div class="copy">${item.body}</div>
        <div class="visual">${item.visual}</div>
      </div>
    `;

    progressText.textContent = `${current + 1} / ${slides.length}`;
    prevButton.disabled = current === 0;
    nextButton.disabled = current === slides.length - 1;
    nextButton.textContent = current === slides.length - 1 ? "Done" : "Next";
    answerButton.style.visibility = current === slides.length - 1 ? "visible" : "hidden";
    renderTimeline();
  }

  function goTo(index) {
    current = Math.max(0, Math.min(slides.length - 1, index));
    renderSlide();
  }

  prevButton.addEventListener("click", () => goTo(current - 1));
  nextButton.addEventListener("click", () => goTo(current + 1));

  stepList.addEventListener("click", (event) => {
    const button = event.target.closest("[data-index]");
    if (button) goTo(Number(button.dataset.index));
  });

  dots.addEventListener("click", (event) => {
    const button = event.target.closest("[data-index]");
    if (button) goTo(Number(button.dataset.index));
  });

  answerButton.addEventListener("click", () => {
    const answerKey = document.getElementById("answerKey");
    if (!answerKey) return;
    answerKey.classList.toggle("is-visible");
    answerButton.textContent = answerKey.classList.contains("is-visible") ? "Hide answers" : "Show answers";
  });

  document.addEventListener("keydown", (event) => {
    if (event.key === "ArrowRight") goTo(current + 1);
    if (event.key === "ArrowLeft") goTo(current - 1);
  });

  renderSlide();
</script>
